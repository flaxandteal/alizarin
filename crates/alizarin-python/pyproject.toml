[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "alizarin"
version = "0.1.0"
description = "Python bindings for Alizarin graph management library"
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]

[tool.maturin]
# "extension-module" tells pyo3 to skip Python symbol linking
python-source = "python"
module-name = "alizarin"
