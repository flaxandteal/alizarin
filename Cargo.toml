[package]
name = "alizarin"
version = "0.1.0"
authors = ["Phil Weir <phil.weir@flaxandteal.co.uk>"]
edition = "2018"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
alizarin-core = { path = "crates/alizarin-core" }
wasm-wrapper-derive = { path = "crates/wasm-wrapper-derive" }
wasm-bindgen = "0.2.84"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
uuid = { version = "1.0", features = ["v4", "wasm-bindgen"] }
getrandom = { version = "0.2", features = ["js"] }
once_cell = "1.19"

# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1.7", optional = true }

[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"
# Include debug symbols for better panic backtraces
debug = true

[profile.dev]
# Enable debug symbols for better error messages
debug = true

[dependencies.web-sys]
version = "0.3.4"
features = [
  'console',
  'Document',
  'Element',
  'HtmlElement',
  'Node',
  'Window',
]
