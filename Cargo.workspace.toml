# Example workspace configuration showing how to support both WASM and Python
# To use this, rename to Cargo.toml and move existing Cargo.toml to crates/alizarin-wasm/
[workspace]
members = [
    "crates/alizarin-core",
    "crates/alizarin-wasm",
    "crates/alizarin-python",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
authors = ["Phil Weir <phil.weir@flaxandteal.co.uk>"]
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Shared dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Core crate - no platform-specific dependencies
alizarin-core = { path = "crates/alizarin-core" }
