repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --exclude alizarin-python -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]
      - id: eslint
        name: eslint
        entry: npx eslint js --ext .ts
        language: system
        pass_filenames: false
        types_or: [ts, javascript]
