name: Extensions

on:
  push:
    branches: [main, dev/*]
    paths:
      - 'ext/**'
      - '.github/workflows/extensions.yml'
  pull_request:
    paths:
      - 'ext/**'
  workflow_dispatch:

jobs:
  # Build and test JS extensions
  js-extensions:
    name: JS Extensions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node dependencies (root)
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-root-${{ hashFiles('package-lock.json') }}

      # Build main alizarin package first (dependency for extensions)
      - name: Build WASM
        working-directory: crates/alizarin-wasm
        run: wasm-pack build --target web --out-dir ../../pkg --out-name alizarin --release

      # Build filelist WASM (needed by @alizarin/filelist JS extension)
      - name: Build filelist WASM
        working-directory: ext/filelist/wasm
        run: wasm-pack build --target web --release

      - name: Install root dependencies
        run: npm ci

      - name: Build JS package (WASM already built above)
        run: npm run build:js

      # Build all JS extensions
      - name: Build and test JS extensions
        run: |
          # Extensions under ext/js/@alizarin/
          for ext_dir in ext/js/@alizarin/*/; do
            ext_name=$(basename "$ext_dir")
            echo "=== Building @alizarin/$ext_name ==="
            cd "$ext_dir"
            npm install
            npm run build
            cd - > /dev/null
            if [ -d "ext/js/@alizarin/$ext_name/tests" ]; then
              npm test -- "ext/js/@alizarin/$ext_name/tests/" || echo "Tests for $ext_name failed or pending"
            fi
          done

          # @alizarin/filelist (ext/filelist/js/)
          echo "=== Building @alizarin/filelist ==="
          cd ext/filelist/js
          npm install
          npm run build
          cd - > /dev/null
          if [ -d "ext/filelist/js/tests" ]; then
            npm test -- "ext/filelist/js/tests/" || echo "Tests for filelist failed or pending"
          fi

      - name: Upload JS extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alizarin-extensions-js
          path: |
            ext/js/@alizarin/*/dist/
            ext/js/@alizarin/*/package.json
            ext/filelist/js/dist/
            ext/filelist/js/package.json

  # Note: Python extensions are built and tested in python.yml workflow
  # which provides full matrix coverage (Python 3.9-3.13, all major OSes)
