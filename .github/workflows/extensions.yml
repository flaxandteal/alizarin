name: Extensions

on:
  push:
    branches: [main, dev/*]
    paths:
      - 'ext/**'
      - '.github/workflows/extensions.yml'
  pull_request:
    paths:
      - 'ext/**'
  workflow_dispatch:

jobs:
  # Build and test JS extensions
  js-extensions:
    name: JS Extensions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node dependencies (root)
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-root-${{ hashFiles('package-lock.json') }}

      # Build main alizarin package first (dependency for extensions)
      - name: Build WASM
        working-directory: crates/alizarin-wasm
        run: wasm-pack build --target web --out-dir ../../pkg --release

      - name: Install root dependencies
        run: npm ci

      - name: Build main package
        run: npm run build

      # Build all JS extensions
      - name: Build and test JS extensions
        run: |
          for ext_dir in ext/js/@alizarin/*/; do
            ext_name=$(basename "$ext_dir")
            echo "=== Building @alizarin/$ext_name ==="
            cd "$ext_dir"
            npm install
            npm run build
            cd - > /dev/null
            # Run tests if they exist
            if [ -d "ext/js/@alizarin/$ext_name/tests" ]; then
              npm test -- "ext/js/@alizarin/$ext_name/tests/" || echo "Tests for $ext_name failed or pending"
            fi
          done

      - name: Upload JS extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alizarin-extensions-js
          path: |
            ext/js/@alizarin/*/dist/
            ext/js/@alizarin/*/package.json

  # Python extensions
  python-extensions:
    name: Python Extensions (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crates/alizarin-python/target/
            ext/python/*/target/
          key: ${{ runner.os }}-cargo-python-ext-${{ hashFiles('**/Cargo.lock') }}

      - name: Install maturin and test dependencies
        run: pip install maturin pytest pytest-asyncio

      # Build main alizarin Python package first
      - name: Build alizarin wheel
        working-directory: crates/alizarin-python
        run: maturin build --release

      - name: Install alizarin
        working-directory: crates/alizarin-python
        run: |
          WHEEL=$(find target/wheels -name '*.whl' -type f | head -n 1)
          if [ -f "$WHEEL" ]; then
            pip install "$WHEEL" --force-reinstall
          else
            echo "No wheel file found!"
            exit 1
          fi

      # Build all Python extensions
      - name: Build and test Python extensions
        run: |
          for ext_dir in ext/python/*/; do
            ext_name=$(basename "$ext_dir")
            echo "=== Building $ext_name ==="
            cd "$ext_dir"
            maturin build --release
            # Install the wheel
            WHEEL=$(find target/wheels -name '*.whl' -type f | head -n 1)
            if [ -f "$WHEEL" ]; then
              pip install "$WHEEL" --force-reinstall
            else
              echo "No wheel file found for $ext_name!"
              exit 1
            fi
            # Run tests if they exist
            if [ -d "tests" ]; then
              pytest tests/ -v || echo "Tests for $ext_name failed or pending"
            fi
            cd - > /dev/null
          done

      - name: Upload Python extension wheels
        uses: actions/upload-artifact@v4
        with:
          name: alizarin-extensions-python-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ext/python/*/target/wheels/*.whl
