name: Release Package

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'dev/validation'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.0.1-alpha.1)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Build WASM
        working-directory: crates/alizarin-wasm
        run: |
          wasm-pack build --target web --out-dir ../../pkg --out-name alizarin --release
          echo "WASM build complete. Contents of pkg/:"
          ls -lh ../../pkg/

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript/JavaScript bundle
        run: npm run build

      # Build @alizarin/clm extension
      - name: Install @alizarin/clm dependencies
        working-directory: ext/js/@alizarin/clm
        run: npm install

      - name: Build @alizarin/clm
        working-directory: ext/js/@alizarin/clm
        run: npm run build

      - name: Create @alizarin/clm tarball
        working-directory: ext/js/@alizarin/clm
        run: |
          npm pack
          # Move to root so it's found by the release upload
          mv alizarin-clm-*.tgz ../../../../

      - name: Verify build artifacts
        run: |
          echo "Checking dist directory:"
          ls -lh dist/
          echo ""
          echo "Checking pkg directory:"
          ls -lh pkg/
          echo ""
          echo "Checking @alizarin/clm dist directory:"
          ls -lh ext/js/@alizarin/clm/dist/
          echo ""
          echo "Checking tarballs in root:"
          ls -lh *.tgz || echo "No tarballs yet"
          echo ""
          echo "Checking package.json files array includes required directories"
          cat package.json | grep -A 5 '"files"'

      # temp: disable tests - name: Run tests
      # temp: disable tests   run: npm test

      - name: Prepare package for npm
        run: |
          # Remove pkg/.gitignore created by wasm-pack so pkg/ contents are included in tarball
          rm -f pkg/.gitignore
          echo "Removed pkg/.gitignore to ensure WASM files are included in package"

      - name: Create tarball for npm installation
        run: |
          # Create a clean package tarball that npm can install
          npm pack
          echo ""
          echo "Tarball contents:"
          tar -tzf alizarin-*.tgz | grep -E "(pkg/|dist/)" | head -20

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') }}
          files: |
            *.tgz
          body: |
            ## Installation

            Install this release directly from GitHub:

            ```bash
            npm install ${{ github.repository }}#${{ steps.get_version.outputs.version }}
            ```

            Or install from the tarball:

            ```bash
            npm install https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/alizarin-${{ steps.get_version.outputs.version }}.tgz
            ```

            ### @alizarin/clm (CLM Extension)

            To use CLM display serializers (for reference/concept datatypes), install the extension:

            ```bash
            npm install https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/alizarin-clm-0.1.0.tgz
            ```

            Then import it to register the display serializers:

            ```typescript
            import '@alizarin/clm';
            ```

            ## What's Included

            **alizarin:**
            - Pre-built WASM binary (`pkg/`)
            - Bundled JavaScript/TypeScript distribution (`dist/`)
            - Type definitions
            - Source maps

            **@alizarin/clm:**
            - Display serializers for CLM reference datatypes
            - Auto-registers when imported

            ## Changes

            See commits since last release for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output installation instructions
        run: |
          echo "::notice::Release created! Install with: npm install ${{ github.repository }}#${{ steps.get_version.outputs.version }}"
