name: Python Packages

on:
  push:
    branches: [main, dev/*]
    paths:
      - 'crates/alizarin-python/**'
      - 'crates/alizarin-core/**'
      - 'ext/python/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'crates/alizarin-python/**'
      - 'crates/alizarin-core/**'
      - 'ext/python/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Required for Python 3.13+ with PyO3 0.21 (officially supports up to 3.12)
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  # Build and test main alizarin Python package
  alizarin-python:
    name: Build alizarin (Python)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix for faster CI - full matrix on release
          - os: windows-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.10'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crates/alizarin-python/target/
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}

      - name: Install maturin
        run: pip install maturin pytest pytest-asyncio

      - name: Build wheel
        working-directory: crates/alizarin-python
        run: maturin build --release --out dist

      - name: Install wheel
        working-directory: crates/alizarin-python
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Run tests
        working-directory: crates/alizarin-python
        run: pytest tests/ -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: alizarin-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: crates/alizarin-python/dist/*.whl

  # Build and test all Python extensions
  python-extensions:
    name: Build Python extensions (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: alizarin-python  # Extensions depend on alizarin
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix for faster CI - full matrix on release
          - os: windows-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.10'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ext/python/*/target/
          key: ${{ runner.os }}-cargo-extensions-${{ hashFiles('**/Cargo.lock') }}

      - name: Install maturin and pytest
        run: pip install maturin pytest pytest-asyncio

      - name: Download alizarin wheel
        uses: actions/download-artifact@v4
        with:
          name: alizarin-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: /tmp/wheels/

      - name: Install alizarin dependency (Unix)
        if: matrix.os != 'windows-latest'
        run: pip install /tmp/wheels/*.whl

      - name: Install alizarin dependency (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path /tmp/wheels/*.whl | Select-Object -First 1
          pip install $wheel.FullName

      - name: Build and test all Python extensions (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          for ext_dir in ext/python/*/; do
            ext_name=$(basename "$ext_dir")
            echo "=== Building $ext_name ==="
            cd "$ext_dir"
            maturin build --release --out dist
            pip install --no-deps dist/*.whl
            if [ -d "tests" ]; then
              pytest tests/ -v || echo "Tests for $ext_name failed or pending"
            fi
            cd - > /dev/null
          done

      - name: Build and test all Python extensions (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          foreach ($ext_dir in Get-ChildItem -Path ext/python -Directory) {
            $ext_name = $ext_dir.Name
            Write-Host "=== Building $ext_name ==="
            Push-Location $ext_dir.FullName
            maturin build --release --out dist
            $wheel = Get-ChildItem -Path dist/*.whl | Select-Object -First 1
            pip install --no-deps $wheel.FullName
            if (Test-Path "tests") {
              pytest tests/ -v
              if ($LASTEXITCODE -ne 0) { Write-Host "Tests for $ext_name failed or pending" }
            }
            Pop-Location
          }

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-extensions-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ext/python/*/dist/*.whl

  # Source distribution (for PyPI)
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist for alizarin
        working-directory: crates/alizarin-python
        run: maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: alizarin-sdist
          path: crates/alizarin-python/dist/*.tar.gz
